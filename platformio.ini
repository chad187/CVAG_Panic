[platformio]
extra_configs = private_env.ini

[env:lilygo-t-display]
platform = espressif32
board = lilygo-t-display
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, printable

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    arkhipenko/TaskScheduler @ ^3.7.0
    bblanchon/ArduinoJson @ ^7.0.4
    marian-craciunescu/ESP32Ping @ ^1.7
    khoih-prog/AsyncHTTPRequest_Generic @ ^1.13.0

build_flags = 
    ${extra_build_flags.private_flags}
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=135
    -D TFT_HEIGHT=240
    -D CGRAM_OFFSET=1
    -D TFT_MISO=-1
    -D TFT_MOSI=19
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=16
    -D TFT_RST=23
    -D TFT_BL=4
    -D TFT_BACKLIGHT_ON=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D SMOOTH_FONT=1