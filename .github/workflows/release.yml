name: Firmware Build & Release

on:
  pull_request:
    branches:
      - release
  push:
    branches:
      - release

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    outputs:
      firmware-path: ${{ steps.build-info.outputs.firmware-path }}
      version: ${{ steps.read-version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from version.json
        id: read-version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Generate [private_env.ini](http://_vscodecontentref_/6) from secrets
        env:
            WIFI_PROFILES: ${{ secrets.WIFI_PROFILES }}
            SHEET_ID: ${{ secrets.SHEET_ID }}
            SHEET_PASSWORD: ${{ secrets.SHEET_PASSWORD }}
        run: |
            python - <<'PY'
            import os
            w = os.environ.get('WIFI_PROFILES','')
            s = os.environ.get('SHEET_ID','')
            p = os.environ.get('SHEET_PASSWORD','')
            with open('private_env.ini','w') as f:
                f.write('[extra_build_flags]\n')
                f.write('private_flags = \n')
                f.write(f'    -D WIFI_PROFILES={w}\n')
                f.write(f'    -D SHEET_ID={s}\n')
                f.write(f'    -D SHEET_PASSWORD={p}\n')
            print('[private_env.ini](http://_vscodecontentref_/7) generated (verbatim)')
            PY

      - name: Build firmware with PlatformIO
        run: |
          platformio run -e lilygo-t-display

      - name: Verify firmware binary
        id: build-info
        run: |
          FIRMWARE_PATH=".pio/build/lilygo-t-display/firmware.bin"
          if [ -f "$FIRMWARE_PATH" ]; then
            echo "Firmware binary found: $FIRMWARE_PATH"
            echo "firmware-path=$FIRMWARE_PATH" >> $GITHUB_OUTPUT
            ls -lh "$FIRMWARE_PATH"
          else
            echo "ERROR: Firmware binary not found at $FIRMWARE_PATH"
            exit 1
          fi

      - name: Upload firmware as artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.read-version.outputs.version }}
          path: .pio/build/lilygo-t-display/firmware.bin
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ needs.build.outputs.version }}
          path: ./firmware-artifact

      - name: Verify firmware exists
        run: |
          ls -lh ./firmware-artifact/
          if [ ! -f "./firmware-artifact/firmware.bin" ]; then
            echo "ERROR: firmware.bin not found in artifact"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Firmware Release v${{ needs.build.outputs.version }}
          body: |
            Automated firmware release build
            
            **Build Information:**
            - Commit: ${{ github.sha }}
            - Ref: ${{ github.ref }}
            - Run ID: ${{ github.run_id }}
            
            **Assets:**
            - `firmware.bin` - ESP32 firmware binary (ready for OTA update)
          files: |
            ./firmware-artifact/firmware.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}